name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (format + lint)
        run: bun run check

      - name: ESLint (Next.js rules)
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build
